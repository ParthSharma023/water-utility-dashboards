<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Historical Water Consumption Trends - Map</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/leaflet/leaflet.min.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; background-attachment: fixed; }

    .topbar { gap: 16px; flex-shrink: 0; padding: 14px 22px; position: relative; z-index: 2000; overflow: visible; }
    .topbar-logo { height: 44px; flex-shrink: 0; }
    .topbar-title-block h1 { margin: 0; font-size: 20px; line-height: 1.15; }
    .topbar-title-block p  { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

    /* ── Slicer strip ─── */
    .slicer-strip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .slicer-strip label {
      font-size: 10px; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
    }
    .btn-reset {
      background: rgba(93,168,255,.13); border: 1px solid rgba(93,168,255,.3);
      color: #7dc0ff; border-radius: 8px; padding: 0 12px; height: 30px;
      font-size: 12px; cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .btn-reset:hover { background: rgba(93,168,255,.22); }

    /* ── Multi-select widget ─── */
    .multi-filter { position: relative; flex: 0 0 auto; }
    .multi-filter.open { z-index: 2001; }
    .multi-trigger {
      height: 30px; border-radius: 8px;
      border: 1px solid rgba(108,143,186,.36);
      background: #102032; color: var(--text);
      padding: 0 10px; font: inherit; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      min-width: 140px;
    }
    .multi-trigger::after { content: "▾"; color: rgba(180,192,208,.7); font-size: 10px; flex-shrink: 0; }
    .multi-panel {
      display: none; position: absolute; right: 0; left: auto; top: calc(100% + 5px); z-index: 1001;
      width: min(260px, 80vw); padding: 8px; border-radius: 10px;
      border: 1px solid rgba(108,143,186,.36); background: #102032;
      box-shadow: 0 12px 28px rgba(0,0,0,.38); z-index: 2002;
    }
    .multi-filter.open .multi-panel { display: block; }
    .multi-search {
      width: 100%; height: 28px; border-radius: 8px; border: 1px solid rgba(108,143,186,.32);
      background: rgba(10,18,30,.75); color: var(--text); padding: 0 9px;
      font: inherit; font-size: 12px; margin-bottom: 6px; box-sizing: border-box;
    }
    .multi-actions { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .multi-actions button {
      border: 0; background: transparent; color: #7db7ff;
      font: inherit; font-size: 11px; cursor: pointer; padding: 2px;
    }
    .multi-options { max-height: 200px; overflow-y: auto; display: grid; gap: 1px; }
    .multi-option {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; padding: 4px 3px; border-radius: 6px; cursor: pointer;
    }
    .multi-option:hover { background: rgba(93,168,255,.12); }
    .multi-option input { accent-color: #5da8ff; cursor: pointer; }

    /* ── Subtabs ─── */
    .subtabs { flex-shrink: 0; position: relative; z-index: 1999; }
    .page-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ── Left panel (pivot) ─── */
    .left-panel {
      width: 42.5%; flex-shrink: 0;
      display: flex; flex-direction: column; min-height: 0;
      border-right: 1px solid var(--border);
      background: rgba(12,18,28,.65);
    }
    .pivot-scroll { flex: 1; min-height: 0; overflow-y: auto; overflow-x: auto; }
    .pivot-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .pivot-scroll::-webkit-scrollbar-track { background: transparent; }
    .pivot-scroll::-webkit-scrollbar-thumb { background: rgba(100,130,168,.4); border-radius: 3px; }

    /* ── Pivot table ─── */
    .pivot-tbl { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 380px; }
    .pivot-tbl thead th {
      position: sticky; top: 0; z-index: 2;
      background: #162230; padding: 6px 8px;
      border-bottom: 2px solid var(--border);
      font-size: 10px; font-weight: 700; color: var(--muted);
      white-space: nowrap; user-select: none;
    }
    .pivot-tbl thead th:first-child { text-align: left; }
    .pivot-tbl thead th:not(:first-child) { text-align: right; }
    .pivot-tbl td {
      padding: 3px 8px;
      border-bottom: 1px solid rgba(113,144,186,.07);
      white-space: nowrap; text-align: right;
    }
    .pivot-tbl td:first-child { text-align: left; }
    .pivot-tbl td[data-year] { cursor: pointer; }
    .pivot-tbl td[data-year]:hover { color: #5da8ff; background: rgba(40,77,128,.3) !important; }
    .pivot-row-l1 td { font-weight: 700; background: rgba(27,42,61,.92); }
    .pivot-row-l1:hover td { background: rgba(40,65,100,.92); cursor: pointer; }
    .pivot-row-l2 td { background: rgba(19,32,49,.82); font-size: 10.5px; }
    .pivot-row-l2:hover td { background: rgba(32,54,84,.82); cursor: pointer; }
    .pivot-row-l3 td { background: rgba(14,24,38,.75); font-size: 10px; }
    .pivot-row-l3:hover td { background: rgba(28,48,76,.75); cursor: pointer; }
    .pivot-row-subtotal td { font-style: italic; color: var(--muted); font-size: 10px; background: rgba(20,34,52,.88); }
    .pivot-row-selected td { background: rgba(40,77,128,.65) !important; }
    .pivot-year-selected { outline: 2px solid rgba(93,168,255,.6); outline-offset: -2px; }
    .indent-1 { padding-left: 6px !important; }
    .indent-2 { padding-left: 22px !important; }
    .indent-3 { padding-left: 38px !important; }
    .expand-btn {
      background: none; border: none; color: rgba(93,168,255,.75);
      cursor: pointer; padding: 0 3px; font-size: 9px; vertical-align: middle; line-height: 1;
    }
    .expand-btn:hover { color: #5da8ff; }

    /* ── Right panel (map) ─── */
    .right-panel { flex: 1; min-width: 0; position: relative; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* ── Map tooltip ─── */
    .map-tooltip {
      background: rgba(10,18,30,.92); border: 1px solid rgba(93,168,255,.3);
      border-radius: 8px; padding: 8px 11px; font-size: 12px; color: var(--text);
      line-height: 1.6; pointer-events: none; white-space: nowrap;
    }
    .map-tooltip b { color: #7dc0ff; }

    /* ── Map filter badge ─── */
    .map-filter-badge {
      position: absolute; top: 8px; left: 8px; z-index: 500;
      background: rgba(10,18,30,.88); border: 1px solid rgba(93,168,255,.4);
      border-radius: 8px; padding: 5px 10px; font-size: 11px; color: #7dc0ff;
      display: none; cursor: pointer;
    }
    .map-filter-badge:hover { background: rgba(40,77,128,.5); }
  </style>
</head>

<body>
<header class="topbar">
  <div style="display:flex;align-items:center;gap:14px;flex-shrink:0">
    <div class="topbar-title-block">
      <h1>Historical Water Consumption Trends</h1>
      <p>2019 through 2026 &nbsp;·&nbsp; Consumption Map</p>
    </div>
  </div>
  <div class="slicer-strip">
    <label>ACCT CLASS</label>
    <div class="multi-filter" id="mf-acctclass"></div>
    <label>WW METER BASIN</label>
    <div class="multi-filter" id="mf-meterbasin"></div>
    <label>WWTP SERVICE AREA</label>
    <div class="multi-filter" id="mf-servicearea"></div>
    <button class="btn-reset" onclick="resetSlicers()">&#8635; Reset</button>
  </div>
</header>

<nav class="subtabs">
  <button class="subtab" onclick="location.href='account-count.html'">Account Count</button>
  <button class="subtab" onclick="location.href='home-pie.html'">Consumption Mix</button>
  <button class="subtab active">Map</button>
</nav>

<div class="page-body">
  <div class="left-panel">
    <div class="pivot-scroll">
      <table class="pivot-tbl">
        <thead>
          <tr id="pivot-header">
            <th style="min-width:160px;text-align:left">SERVICE AREA / METER BASIN / ACCT CLASS</th>
          </tr>
        </thead>
        <tbody id="pivot-body"></tbody>
      </table>
    </div>
  </div>

  <div class="right-panel">
    <div id="map"></div>
    <div class="map-filter-badge" id="map-badge" onclick="clearMapFilter()">
      ✕ Clear map filter
    </div>
  </div>
</div>

<script src="assets/leaflet/leaflet.min.js"></script>
<script>document.write('<script src="data/data.js?v=' + Date.now() + '"><\/script>');</script>
<script>
// ─── ACCTCLASS colors ─────────────────────────────────────────────────────────
const CLASS_COLORS = {
  'COMM':       '#118DFF',
  'CW-INDIR':   '#12239E',
  'CW-MUD':     '#E66C37',
  'CW-RECLAIM': '#6B007B',
  'CW-WAU':     '#E044A7',
  'CW-WELL':    '#744EC2',
  'DRNONLY':    '#D9B300',
  'EBS':        '#D64550',
  'ECC':        '#197278',
  'FIRE':       '#1AAB40',
  'GOV':        '#15C6F4',
  'INDSWRSUR':  '#4092FF',
  'IRRIG':      '#FFA058',
  'MULTIF':     '#BE5DC9',
  'RES':        '#F472D0',
  'RESALE':     '#B5A1FF',
  'SEWER':      '#C4A200',
  'TRANSIENT':  '#FF8080',
  'XX':         '#00DBBC',
};
const FALLBACK_COLORS = [
  '#118DFF','#12239E','#E66C37','#6B007B','#E044A7','#744EC2','#D9B300',
  '#D64550','#197278','#1AAB40','#15C6F4','#4092FF','#FFA058','#BE5DC9',
  '#F472D0','#B5A1FF','#C4A200','#FF8080','#00DBBC','#5BD667',
];
function classColor(cls, idx) {
  return CLASS_COLORS[cls] || FALLBACK_COLORS[(idx || 0) % FALLBACK_COLORS.length];
}

// ─── Filter state ─────────────────────────────────────────────────────────────
const S = {
  filterSA: new Set(),
  filterMB: new Set(),
  filterAC: new Set(),
};

const YEARS = window.DATA_META.years;
const expandedL1 = new Set();
const expandedL2 = new Set();
let pivotFilter = null;  // {sa, mb?, ac?, year?}
let mapFilter   = null;  // {sa, mb, ac} - from map bubble click

// ─── Multi-select widget ──────────────────────────────────────────────────────
const FILTERS = {};

function createMultiSelect(id, label, selectedSet, onChange) {
  const root = document.getElementById(id);
  root.innerHTML = `
    <button type="button" class="multi-trigger"></button>
    <div class="multi-panel">
      <input class="multi-search" type="search" placeholder="Search ${label}">
      <div class="multi-actions">
        <button type="button" data-act="all">Select all</button>
        <button type="button" data-act="clear">Clear</button>
      </div>
      <div class="multi-options"></div>
    </div>`;

  const trigger   = root.querySelector('.multi-trigger');
  const search    = root.querySelector('.multi-search');
  const optionsEl = root.querySelector('.multi-options');
  let options = [];

  function updateLabel() {
    if (!selectedSet.size)         trigger.textContent = `All ${label}`;
    else if (selectedSet.size===1) trigger.textContent = [...selectedSet][0];
    else                           trigger.textContent = `${selectedSet.size} ${label}`;
  }

  function renderOptions() {
    const q = search.value.trim().toLowerCase();
    const visible = options.filter(v => !q || v.toLowerCase().includes(q));
    optionsEl.innerHTML = '';
    if (!visible.length) {
      const msg = document.createElement('div');
      msg.className = 'multi-option'; msg.style.color = 'var(--muted)';
      msg.textContent = 'No matches';
      optionsEl.appendChild(msg);
      return;
    }
    visible.forEach(v => {
      const row   = document.createElement('label');
      row.className = 'multi-option';
      const input = document.createElement('input');
      input.type    = 'checkbox';
      input.value   = v;
      input.checked = selectedSet.has(v);
      const text  = document.createElement('span');
      text.textContent = v;
      input.addEventListener('change', () => {
        input.checked ? selectedSet.add(v) : selectedSet.delete(v);
        updateLabel();
        onChange();
      });
      row.append(input, text);
      optionsEl.appendChild(row);
    });
  }

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.multi-filter.open').forEach(el => {
      if (el !== root) el.classList.remove('open');
    });
    root.classList.toggle('open');
    if (root.classList.contains('open')) { search.focus({ preventScroll: true }); renderOptions(); }
  });

  search.addEventListener('input', renderOptions);

  root.querySelector('[data-act="all"]').addEventListener('click', () => {
    options.forEach(v => selectedSet.add(v));
    updateLabel(); renderOptions(); onChange();
  });
  root.querySelector('[data-act="clear"]').addEventListener('click', () => {
    selectedSet.clear();
    updateLabel(); renderOptions(); onChange();
  });

  FILTERS[id] = {
    setOptions(values) {
      options = [...values].filter(Boolean);
      for (const v of [...selectedSet]) if (!options.includes(v)) selectedSet.delete(v);
      updateLabel();
      if (root.classList.contains('open')) renderOptions();
    },
  };
  updateLabel();
}

// ─── Format helpers ───────────────────────────────────────────────────────────
function fmtPivot(v) {
  if (!v) return '';
  if (v >= 1e9)     return (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6)     return (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3)     return Math.round(v / 1e3).toLocaleString() + 'K';
  return Math.round(v).toLocaleString();
}
function fmtGpd(v) {
  if (!v) return '-';
  return Math.round(v).toLocaleString() + ' gpd';
}
function escH(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Filtering ────────────────────────────────────────────────────────────────
function filterAgg(pf, mf) {
  return window.DATA_AGG.filter(r => {
    if (S.filterAC.size && !S.filterAC.has(r.ACCTCLASS))  return false;
    if (S.filterMB.size && !S.filterMB.has(r.METERBASIN)) return false;
    if (S.filterSA.size && !S.filterSA.has(r.SERVICE_AR)) return false;
    if (pf) {
      if (pf.sa   && r.SERVICE_AR !== pf.sa)  return false;
      if (pf.mb   && r.METERBASIN !== pf.mb)  return false;
      if (pf.ac   && r.ACCTCLASS  !== pf.ac)  return false;
      if (pf.year && r.YEAR       !== pf.year) return false;
    }
    if (mf) {
      if (mf.sa && r.SERVICE_AR !== mf.sa) return false;
      if (mf.mb && r.METERBASIN !== mf.mb) return false;
      if (mf.ac && r.ACCTCLASS  !== mf.ac) return false;
    }
    return true;
  });
}

// ─── Chunk loader ─────────────────────────────────────────────────────────────
const loadedChunks = new Set();   // SA names already loaded
window.DATA_MAP_CHUNKS = window.DATA_MAP_CHUNKS || {};

function loadChunks(saSet, callback) {
  // Which SAs do we need? Empty set = all.
  const needed = saSet.size > 0
    ? [...saSet]
    : window.DATA_META.serviceAreas;

  const toLoad = needed.filter(sa => !loadedChunks.has(sa) && window.DATA_MAP_INDEX[sa]);
  if (!toLoad.length) { callback(); return; }

  let remaining = toLoad.length;
  for (const sa of toLoad) {
    const script = document.createElement('script');
    script.src = window.DATA_MAP_INDEX[sa] + '?v=' + encodeURIComponent(window.DATA_VERSION || '');
    script.onload = () => {
      loadedChunks.add(sa);
      if (--remaining === 0) callback();
    };
    script.onerror = () => { if (--remaining === 0) callback(); };
    document.head.appendChild(script);
  }
}

function filterMap() {
  const pf = pivotFilter;
  const mf = mapFilter;
  const rows = [];
  const sas = S.filterSA.size > 0 ? [...S.filterSA] : window.DATA_META.serviceAreas;
  for (const sa of sas) {
    const chunk = window.DATA_MAP_CHUNKS[sa];
    if (!chunk) continue;
    for (const r of chunk) {
      if (S.filterAC.size && !S.filterAC.has(r.ac)) continue;
      if (S.filterMB.size && !S.filterMB.has(r.mb)) continue;
      if (mf) {
        if (mf.sa && r.sa !== mf.sa) continue;
        if (mf.mb && r.mb !== mf.mb) continue;
        if (mf.ac && r.ac !== mf.ac) continue;
      }
      rows.push(r);
    }
  }
  return rows;
}

// Returns true if this bubble matches the active pivotFilter (for dimming)
function bubbleMatchesPivot(r) {
  const pf = pivotFilter;
  if (!pf) return true;
  if (pf.sa && r.sa !== pf.sa) return false;
  if (pf.mb && r.mb !== pf.mb) return false;
  if (pf.ac && r.ac !== pf.ac) return false;
  return true;
}

// ─── Cascading slicer options ─────────────────────────────────────────────────
function refreshSlicerOptions() {
  const bySA   = window.DATA_AGG.filter(r => !S.filterSA.size || S.filterSA.has(r.SERVICE_AR));
  const bySAMB = bySA.filter(r =>             !S.filterMB.size || S.filterMB.has(r.METERBASIN));
  const availMBs = new Set(bySA.map(r => r.METERBASIN));
  const availACs = new Set(bySAMB.map(r => r.ACCTCLASS));
  FILTERS['mf-meterbasin'].setOptions(window.DATA_META.meterBasins.filter(v => availMBs.has(v)));
  FILTERS['mf-acctclass'].setOptions(window.DATA_META.acctClasses.filter(v => availACs.has(v)));
}

// ─── Slicer init ──────────────────────────────────────────────────────────────
function initSlicers() {
  // Map page defaults: SERVICE_AR='Beltway', METERBASIN='BW003'
  S.filterSA.add('Beltway');
  S.filterMB.add('BW003');

  createMultiSelect('mf-servicearea', 'Service Areas', S.filterSA, () => {
    pivotFilter = null; mapFilter = null;
    refreshSlicerOptions();
    render();
  });
  FILTERS['mf-servicearea'].setOptions(window.DATA_META.serviceAreas);

  createMultiSelect('mf-meterbasin', 'Meter Basins', S.filterMB, () => {
    pivotFilter = null; mapFilter = null;
    refreshSlicerOptions();
    render();
  });
  createMultiSelect('mf-acctclass', 'Acct Classes', S.filterAC, () => {
    pivotFilter = null; mapFilter = null;
    render();
  });

  refreshSlicerOptions();
}

function resetSlicers() {
  S.filterSA.clear(); S.filterSA.add('Beltway');
  S.filterMB.clear(); S.filterMB.add('BW003');
  S.filterAC.clear();
  pivotFilter = null;
  mapFilter   = null;
  expandedL1.clear(); expandedL1.add('Beltway');
  expandedL2.clear(); expandedL2.add('Beltway|BW003');
  FILTERS['mf-servicearea'].setOptions(window.DATA_META.serviceAreas);
  refreshSlicerOptions();
  buildPivot(filterAgg(null, null));
  loadChunks(S.filterSA, updateMap);
}

// ─── Pivot (3-level, row subtotals ON) ───────────────────────────────────────
function buildPivot(data) {
  const tree = {};
  for (const r of data) {
    const { SERVICE_AR: sa, METERBASIN: mb, ACCTCLASS: ac, YEAR: yr, gpd_sum } = r;
    if (!tree[sa])       tree[sa]       = {};
    if (!tree[sa][mb])   tree[sa][mb]   = {};
    if (!tree[sa][mb][ac]) tree[sa][mb][ac] = {};
    tree[sa][mb][ac][yr] = (tree[sa][mb][ac][yr] || 0) + gpd_sum;
  }

  const pf   = pivotFilter;
  const html = [];

  for (const sa of Object.keys(tree).sort()) {
    // L1 totals
    const saY = {};
    for (const mb of Object.values(tree[sa]))
      for (const acY of Object.values(mb))
        for (const yr of YEARS) saY[yr] = (saY[yr]||0) + (acY[yr]||0);

    const selL1 = pf && pf.sa === sa && !pf.mb && !pf.year;
    const expL1 = expandedL1.has(sa);

    const saYearCells = YEARS.map(yr => {
      const sel = pf && pf.sa === sa && !pf.mb && pf.year === yr;
      return `<td data-year="${yr}" data-level="1" data-sa="${escH(sa)}" data-mb="" data-ac=""` +
             (sel ? ' class="pivot-year-selected"' : '') +
             `>${fmtPivot(saY[yr]||0)}</td>`;
    }).join('');

    html.push(
      `<tr class="pivot-row-l1${selL1 ? ' pivot-row-selected' : ''}" ` +
      `data-level="1" data-sa="${escH(sa)}" data-mb="" data-ac="">` +
      `<td class="indent-1"><button class="expand-btn" data-action="expandL1" data-sa="${escH(sa)}">${expL1 ? '▼' : '▶'}</button> ${escH(sa)}</td>` +
      saYearCells + `</tr>`
    );

    if (expL1) {
      for (const mb of Object.keys(tree[sa]).sort()) {
        const mbY = {};
        for (const acY of Object.values(tree[sa][mb]))
          for (const yr of YEARS) mbY[yr] = (mbY[yr]||0) + (acY[yr]||0);

        const selL2 = pf && pf.sa === sa && pf.mb === mb && !pf.ac && !pf.year;
        const expL2 = expandedL2.has(`${sa}|${mb}`);

        const mbYearCells = YEARS.map(yr => {
          const sel = pf && pf.sa === sa && pf.mb === mb && !pf.ac && pf.year === yr;
          return `<td data-year="${yr}" data-level="2" data-sa="${escH(sa)}" data-mb="${escH(mb)}" data-ac=""` +
                 (sel ? ' class="pivot-year-selected"' : '') +
                 `>${fmtPivot(mbY[yr]||0)}</td>`;
        }).join('');

        html.push(
          `<tr class="pivot-row-l2${selL2 ? ' pivot-row-selected' : ''}" ` +
          `data-level="2" data-sa="${escH(sa)}" data-mb="${escH(mb)}" data-ac="">` +
          `<td class="indent-2"><button class="expand-btn" data-action="expandL2" data-sa="${escH(sa)}" data-mb="${escH(mb)}">${expL2 ? '▼' : '▶'}</button> ${escH(mb)}</td>` +
          mbYearCells + `</tr>`
        );

        if (expL2) {
          for (const ac of Object.keys(tree[sa][mb]).sort()) {
            const acY   = tree[sa][mb][ac];
            const selL3 = pf && pf.sa === sa && pf.mb === mb && pf.ac === ac && !pf.year;

            const acYearCells = YEARS.map(yr => {
              const sel = pf && pf.sa === sa && pf.mb === mb && pf.ac === ac && pf.year === yr;
              return `<td data-year="${yr}" data-level="3" data-sa="${escH(sa)}" data-mb="${escH(mb)}" data-ac="${escH(ac)}"` +
                     (sel ? ' class="pivot-year-selected"' : '') +
                     `>${fmtPivot(acY[yr]||0)}</td>`;
            }).join('');

            html.push(
              `<tr class="pivot-row-l3${selL3 ? ' pivot-row-selected' : ''}" ` +
              `data-level="3" data-sa="${escH(sa)}" data-mb="${escH(mb)}" data-ac="${escH(ac)}">` +
              `<td class="indent-3" style="color:${classColor(ac)}">${escH(ac)}</td>` +
              acYearCells + `</tr>`
            );
          }

          // MB subtotal row (row subtotals ON)
          const mbSubCells = YEARS.map(yr =>
            `<td>${fmtPivot(mbY[yr]||0)}</td>`
          ).join('');
          html.push(
            `<tr class="pivot-row-subtotal">` +
            `<td class="indent-2">Total ${escH(mb)}</td>` +
            mbSubCells + `</tr>`
          );
        }
      }

      // SA subtotal row (row subtotals ON)
      const saSubCells = YEARS.map(yr =>
        `<td>${fmtPivot(saY[yr]||0)}</td>`
      ).join('');
      html.push(
        `<tr class="pivot-row-subtotal">` +
        `<td class="indent-1">Total ${escH(sa)}</td>` +
        saSubCells + `</tr>`
      );
    }
  }
  document.getElementById('pivot-body').innerHTML = html.join('');
}

document.getElementById('pivot-body').addEventListener('click', function(e) {
  const btn = e.target.closest('.expand-btn');
  if (btn) {
    e.stopPropagation();
    const action = btn.dataset.action;
    const sa = btn.dataset.sa;
    const mb = btn.dataset.mb;
    if (action === 'expandL1') {
      expandedL1.has(sa) ? expandedL1.delete(sa) : expandedL1.add(sa);
    } else if (action === 'expandL2') {
      const key = `${sa}|${mb}`;
      expandedL2.has(key) ? expandedL2.delete(key) : expandedL2.add(key);
    }
    buildPivot(filterAgg(mapFilter, null));
    return;
  }

  const td = e.target.closest('td[data-year]');
  if (td) {
    const yr    = parseInt(td.dataset.year);
    const level = parseInt(td.dataset.level);
    const sa = td.dataset.sa || null;
    const mb = td.dataset.mb || null;
    const ac = td.dataset.ac || null;
    const nf = {
      sa:   (level >= 1 && sa) ? sa : null,
      mb:   (level >= 2 && mb) ? mb : null,
      ac:   (level >= 3 && ac) ? ac : null,
      year: yr,
    };
    const same = pivotFilter && pivotFilter.year === nf.year &&
      pivotFilter.sa === nf.sa && pivotFilter.mb === nf.mb && pivotFilter.ac === nf.ac;
    pivotFilter = same ? null : nf;
    mapFilter = null;
    updateBadge();
    buildPivot(filterAgg(null, null));
    updateMap(false);
    return;
  }

  const tr = e.target.closest('tr[data-level]');
  if (!tr) return;
  const level = parseInt(tr.dataset.level);
  const sa = tr.dataset.sa || null;
  const mb = tr.dataset.mb || null;
  const ac = tr.dataset.ac || null;
  const nf = {
    sa:   (level >= 1 && sa) ? sa : null,
    mb:   (level >= 2 && mb) ? mb : null,
    ac:   (level >= 3 && ac) ? ac : null,
    year: null,
  };
  const same = pivotFilter && !pivotFilter.year &&
    pivotFilter.sa === nf.sa && pivotFilter.mb === nf.mb && pivotFilter.ac === nf.ac;
  pivotFilter = same ? null : nf;
  mapFilter = null;
  updateBadge();
  buildPivot(filterAgg(null, null));
  updateMap(false);
});

// ─── Leaflet map ──────────────────────────────────────────────────────────────
let leafletMap   = null;
let bubbleLayer  = L.layerGroup();

function initMap() {
  leafletMap = L.map('map', {
    center: [29.76, -95.37],
    zoom: 10,
    zoomControl: true,
  });

  // Token-free dark basemap (OpenStreetMap data, CARTO tiles)
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
    {
      subdomains: 'abcd',
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    }
  ).addTo(leafletMap);

  bubbleLayer.addTo(leafletMap);

  // Re-measure once the page has fully laid out (fonts / flex sizing can
  // change the container height after L.map() first reads it).
  window.addEventListener('load', () => leafletMap.invalidateSize());

  leafletMap.on('click', function(e) {
    if (!e.originalEvent.target.closest || !e.originalEvent.target.closest('.leaflet-marker-icon, .leaflet-interactive')) {
      if (mapFilter) { clearMapFilter(); }
    }
  });
}

// DATA_MAP is already one row per account - pass through directly
function aggregateMapData(rows) {
  return rows
    .filter(r => r.lat && r.lon)
    .map(r => ({
      sa:  r.sa,
      mb:  r.mb,
      ac:  r.ac,
      gpd: r.gpd_sum || 0,
      lat: r.lat,
      lon: r.lon,
      addr: r.addr,
      st:   r.st,
    }));
}

function updateMap(doFit = true) {
  bubbleLayer.clearLayers();

  const rawRows = filterMap();
  const bubbles = aggregateMapData(rawRows);
  if (!bubbles.length) return;

  const maxGpd = Math.max(...bubbles.map(b => b.gpd));
  if (maxGpd <= 0) return;

  const MIN_R = 4, MAX_R = 24;

  // Auto-zoom to fit all visible bubbles
  if (doFit) {
    const lats = bubbles.map(b => b.lat);
    const lons = bubbles.map(b => b.lon);
    const bounds = L.latLngBounds(
      [Math.min(...lats), Math.min(...lons)],
      [Math.max(...lats), Math.max(...lons)]
    );
    leafletMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 16, animate: false });
  }

  for (const b of bubbles) {
    const r      = MIN_R + Math.sqrt(b.gpd / maxGpd) * (MAX_R - MIN_R);
    const color  = classColor(b.ac);
    const isMapSelected   = mapFilter && mapFilter.sa === b.sa && mapFilter.mb === b.mb && mapFilter.ac === b.ac;
    const pivotMatch      = bubbleMatchesPivot(b);
    const dimmed          = (mapFilter && !isMapSelected) || (pivotFilter && !pivotMatch);

    const marker = L.circleMarker([b.lat, b.lon], {
      radius:      r,
      fillColor:   color,
      color:       isMapSelected ? '#ffffff' : 'rgba(0,0,0,0.3)',
      weight:      isMapSelected ? 2 : 0.5,
      opacity:     1,
      fillOpacity: dimmed ? 0.12 : 0.75,
    });

    const tooltipHtml = `
      <div class="map-tooltip">
        <b>Annual AVG GPD</b>: ${Math.round(b.gpd).toLocaleString()}<br>
        <b>METER BASIN</b>: ${escH(b.mb)}<br>
        <b>ACCTCLASS</b>: ${escH(b.ac)}<br>
        <b>ADDRESSNUM</b>: ${escH(b.addr)}<br>
        <b>ST_NAME</b>: ${escH(b.st)}
      </div>`;

    marker.bindTooltip(tooltipHtml, {
      sticky: true,
      opacity: 1,
      className: 'leaflet-tooltip-custom',
    });

    marker.on('click', function(e) {
      L.DomEvent.stopPropagation(e);
      const same = mapFilter && mapFilter.sa === b.sa && mapFilter.mb === b.mb && mapFilter.ac === b.ac;
      mapFilter   = same ? null : { sa: b.sa, mb: b.mb, ac: b.ac };
      pivotFilter = null;
      updateBadge();
      buildPivot(filterAgg(mapFilter, null));
      if (mapFilter) {
        leafletMap.setView([b.lat, b.lon], Math.max(leafletMap.getZoom(), 15));
        updateMap(false); // skip auto-fit - we just zoomed to the clicked bubble
      } else {
        updateMap();
      }
    });

    bubbleLayer.addLayer(marker);
  }
}

function clearMapFilter() {
  mapFilter = null;
  updateBadge();
  buildPivot(filterAgg(null, null));
  updateMap();
}

function updateBadge() {
  const badge = document.getElementById('map-badge');
  if (mapFilter) {
    badge.style.display = 'block';
    badge.textContent = `✕ ${mapFilter.ac} · ${mapFilter.mb}`;
  } else {
    badge.style.display = 'none';
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  buildPivot(filterAgg(mapFilter, null));
  loadChunks(S.filterSA, updateMap);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.multi-filter')) {
    document.querySelectorAll('.multi-filter.open').forEach(el => el.classList.remove('open'));
  }
});

// ─── Dynamic setup ────────────────────────────────────────────────────────────
function buildPivotHeader() {
  const tr = document.getElementById('pivot-header');
  YEARS.forEach(y => {
    const th = document.createElement('th');
    th.style.width = '84px';
    th.textContent = y;
    tr.appendChild(th);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
initSlicers();
buildPivotHeader();
initMap();
expandedL1.add('Beltway');
expandedL2.add('Beltway|BW003');
render();
</script>
</body>
